# Ensure homebrew is in PATH for plugin scripts
set-environment -g PATH "/opt/homebrew/bin:/usr/bin:/bin:/usr/sbin:/sbin"
# Remap prefix from Ctrl-b to Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Catppuccin theme (must load before TPM)
set -g @catppuccin_flavor "mocha"

# Status bar modules
#

# navi keybinding
bind-key -N "Open Navi (cheat sheets)" -T prefix C-g split-window \
  "$SHELL --login -i -c 'navi --print | tmux load-buffer -b tmp - ; tmux paste-buffer -p -t {last} -b tmp -d'"

# Options to make tmux more pleasant
set -g mouse on
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}#{E:@catppuccin_status_directory}#{E:@catppuccin_status_date_time}"

run ~/.tmux/plugins/catppuccin/tmux/catppuccin.tmux

# TPM (keep at bottom)
set -g @plugin 'tmux-plugins/tpm'
run '~/.tmux/plugins/tpm/tpm'
